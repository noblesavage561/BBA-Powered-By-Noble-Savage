<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBA Reset Refresh</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #e6f1ff;
        background: linear-gradient(160deg, #0b1120, #111b32);
      }
      .card {
        width: min(680px, 92vw);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 22px;
        background: rgba(255, 255, 255, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Resetting Browser Session</h1>
      <p>Clearing local cache, storage, and stale service workers. Redirecting to the latest dashboard build...</p>
    </section>
    <script>
      (async () => {
        try {
          localStorage.clear();
          sessionStorage.clear();
        } catch (_) {}

        if ("caches" in window) {
          try {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          } catch (_) {}
        }

        if ("serviceWorker" in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          } catch (_) {}
        }

        const target = new URL("/", window.location.origin);
        target.searchParams.set("v", String(Date.now()));
        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
