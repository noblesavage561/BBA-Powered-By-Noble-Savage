<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBA Services OS Frontend Check</title>
    <style>
      :root {
        --bg-1: #061a24;
        --bg-2: #0d2d3d;
        --accent: #f59e0b;
        --card: rgba(255, 255, 255, 0.08);
        --text: #eef2ff;
        --muted: #cbd5e1;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.22), transparent 35%),
          radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.2), transparent 30%),
          linear-gradient(140deg, var(--bg-1), var(--bg-2));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .panel {
        width: 100%;
        max-width: 760px;
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 24px;
        backdrop-filter: blur(10px);
        padding: 24px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
      }

      .card {
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.18);
        padding: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .value {
        margin-top: 8px;
        font-size: 1.05rem;
        font-weight: 600;
        word-break: break-word;
      }

      .ok { color: #34d399; }
      .warn { color: var(--accent); }
      .err { color: #fb7185; }

      pre {
        margin: 18px 0 0;
        border-radius: 14px;
        padding: 14px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #dbeafe;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>BBA Services OS Frontend Health</h1>
      <p>Frontend sanity page for review. Loads data via GraphQL gateway.</p>

      <section class="grid">
        <article class="card">
          <div class="label">GraphQL Reachability</div>
          <div id="graphql-status" class="value warn">Checking...</div>
        </article>
        <article class="card">
          <div class="label">Backend Status</div>
          <div id="backend-status" class="value warn">Checking...</div>
        </article>
        <article class="card">
          <div class="label">Database Connected</div>
          <div id="db-status" class="value warn">Checking...</div>
        </article>
        <article class="card">
          <div class="label">Redis Connected</div>
          <div id="redis-status" class="value warn">Checking...</div>
        </article>
      </section>

      <pre id="raw-output">Waiting for response...</pre>
    </main>

    <script>
      async function loadStatus() {
        const rawEl = document.getElementById("raw-output");
        const graphEl = document.getElementById("graphql-status");
        const backEl = document.getElementById("backend-status");
        const dbEl = document.getElementById("db-status");
        const redisEl = document.getElementById("redis-status");

        try {
          const response = await fetch("http://127.0.0.1:4000/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              query: "query { health { status db_connected redis_connected timestamp } }",
            }),
          });

          if (!response.ok) {
            throw new Error("GraphQL HTTP " + response.status);
          }

          const json = await response.json();
          rawEl.textContent = JSON.stringify(json, null, 2);

          if (json.errors) {
            graphEl.textContent = "Error";
            graphEl.className = "value err";
            backEl.textContent = "Unknown";
            backEl.className = "value warn";
            dbEl.textContent = "Unknown";
            redisEl.textContent = "Unknown";
            return;
          }

          graphEl.textContent = "OK";
          graphEl.className = "value ok";

          const health = json.data.health;
          backEl.textContent = health.status;
          backEl.className = health.status === "healthy" ? "value ok" : "value warn";

          dbEl.textContent = health.db_connected ? "true" : "false";
          dbEl.className = health.db_connected ? "value ok" : "value err";

          redisEl.textContent = health.redis_connected ? "true" : "false";
          redisEl.className = health.redis_connected ? "value ok" : "value err";
        } catch (err) {
          graphEl.textContent = "Unavailable";
          graphEl.className = "value err";
          backEl.textContent = "Unavailable";
          backEl.className = "value err";
          dbEl.textContent = "Unavailable";
          dbEl.className = "value err";
          redisEl.textContent = "Unavailable";
          redisEl.className = "value err";
          rawEl.textContent = String(err);
        }
      }

      loadStatus();
    </script>
  </body>
</html>
