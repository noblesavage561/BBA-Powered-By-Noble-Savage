services:
  db:
    image: postgres:15-alpine
    container_name: bba_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bba_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bba_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bba_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bba_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: bba_os
      REDIS_URL: redis://redis:6379
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      PRIMARY_MODEL: ${PRIMARY_MODEL:-openai/gpt-4o-mini}
      SECONDARY_MODEL: ${SECONDARY_MODEL:-x-ai/grok-beta}
      THIRD_MODEL: ${THIRD_MODEL:-openai/gpt-3.5-turbo}
      TEXT_ONLY_MODEL: ${TEXT_ONLY_MODEL:-openai/gpt-3.5-turbo}
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  graphql:
    build:
      context: ./graphql
      dockerfile: Dockerfile
    container_name: bba_graphql
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "4000:4000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/.well-known/apollo/server-health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bba_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      graphql:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
