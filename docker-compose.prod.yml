services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bba_os}
    ports: []

  redis:
    ports: []

  backend:
    environment:
      ENVIRONMENT: production
      REQUIRE_AI_KEY: ${REQUIRE_AI_KEY:-true}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:?set DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_NAME: ${DB_NAME:-bba_os}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_API_KEY: ${AI_API_KEY:?set AI_API_KEY}
      PRIMARY_MODEL: ${PRIMARY_MODEL:-openai/gpt-4o-mini}
      SECONDARY_MODEL: ${SECONDARY_MODEL:-x-ai/grok-beta}
      THIRD_MODEL: ${THIRD_MODEL:-openai/gpt-3.5-turbo}
      TEXT_ONLY_MODEL: ${TEXT_ONLY_MODEL:-openai/gpt-3.5-turbo}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?set ALLOWED_HOSTS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
    ports: []

  graphql:
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      CORS_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
    ports: []

  frontend:
    ports:
      - "80:80"
